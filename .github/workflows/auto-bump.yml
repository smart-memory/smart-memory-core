name: Auto-bump patch version

on:
  push:
    branches: [main]
    paths-ignore:
      - 'VERSION'              # Don't re-trigger on version bump commits
      - '*.md'
      - 'docs/**'

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Check if VERSION was changed in this push
      id: check
      run: |
        if git diff HEAD~1 --name-only | grep -q '^VERSION$'; then
          echo "skip=true" >> $GITHUB_OUTPUT
        else
          echo "skip=false" >> $GITHUB_OUTPUT
        fi

    - name: Bump patch version
      if: steps.check.outputs.skip == 'false'
      run: |
        VERSION=$(cat VERSION | tr -d '\n')
        IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
        NEW_PATCH=$((PATCH + 1))
        NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
        echo "$NEW_VERSION" > VERSION
        echo "Bumped $VERSION → $NEW_VERSION"

    - name: Commit and push
      if: steps.check.outputs.skip == 'false'
      run: |
        git config user.name "smartmem-dev"
        git config user.email "smartmem-dev@users.noreply.github.com"
        git add VERSION
        git commit -m "chore: auto-bump to $(cat VERSION)"
        git push
