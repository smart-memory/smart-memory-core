name: Publish smartmemory-core to PyPI

on:
  push:
    branches:
      - main
    paths:
      - 'VERSION'
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for trusted publishing
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine setuptools>=61.0 wheel
    
    - name: Check if version exists on PyPI
      id: check_version
      run: |
        VERSION=$(cat VERSION | tr -d '\n')
        echo "📦 Local version: $VERSION"
        
        # Check if version exists on PyPI
        if pip index versions smartmemory-core 2>/dev/null | grep -q "($VERSION)"; then
          echo "⏭️  Version $VERSION already exists on PyPI, skipping..."
          echo "skip=true" >> $GITHUB_OUTPUT
        else
          echo "✅ Version $VERSION not found on PyPI, proceeding with publish..."
          echo "skip=false" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        fi
    
    - name: Clean previous builds
      if: steps.check_version.outputs.skip != 'true'
      run: |
        rm -rf dist/ build/ *.egg-info
    
    - name: Build package
      if: steps.check_version.outputs.skip != 'true'
      run: |
        python -m build --no-isolation
        echo "📦 Package built successfully"
        ls -lh dist/
    
    - name: Check package
      if: steps.check_version.outputs.skip != 'true'
      run: |
        twine check dist/*
        echo "✅ Package validation passed"
    
    - name: Verify package contents
      if: steps.check_version.outputs.skip != 'true'
      run: |
        # List contents of the wheel
        python -m zipfile -l dist/*.whl | head -20
        echo "..."
        echo "✅ Package contents verified"
    
    - name: Publish to PyPI
      if: steps.check_version.outputs.skip != 'true'
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: |
        echo "🚀 Publishing to PyPI..."
        twine upload dist/* --verbose
        echo "✅ Published to PyPI successfully!"
    
    - name: Wait for PyPI to update
      if: steps.check_version.outputs.skip != 'true'
      run: |
        echo "⏳ Waiting 60 seconds for PyPI to update..."
        sleep 60
    
    - name: Test installation from PyPI
      if: steps.check_version.outputs.skip != 'true'
      run: |
        # Create fresh virtual environment
        python -m venv test-env
        source test-env/bin/activate
        
        # Test base install (import only — CLI deps are in [cli] extra)
        pip install smartmemory-core --no-cache-dir
        python -c "from smartmemory import SmartMemory; print('✅ Package installed successfully from PyPI!')"
        python -c "from smartmemory import __version__; print(f'📦 Version: {__version__}')"

        # Test console script entry point (requires [cli] extra for click/rich)
        pip install smartmemory-core[cli] --no-cache-dir
        smartmemory-core --help
        
        deactivate
    
    - name: Create deployment summary
      if: steps.check_version.outputs.skip != 'true'
      run: |
        VERSION=$(cat VERSION | tr -d '\n')
        echo "## 🎉 smartmemory-core v$VERSION Published to PyPI" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Installation" >> $GITHUB_STEP_SUMMARY
        echo '```bash' >> $GITHUB_STEP_SUMMARY
        echo "pip install smartmemory-core==$VERSION" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Links" >> $GITHUB_STEP_SUMMARY
        echo "- 📦 [PyPI Package](https://pypi.org/project/smartmemory-core/$VERSION/)" >> $GITHUB_STEP_SUMMARY
        echo "- 📚 [Documentation](https://docs.smartmemory.ai)" >> $GITHUB_STEP_SUMMARY
        echo "- 🐙 [GitHub Repository](https://github.com/smart-memory/smart-memory)" >> $GITHUB_STEP_SUMMARY

    - name: Notify Discord
      if: always()
      shell: bash
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        STATUS: ${{ job.status }}
        RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        REPO: ${{ github.repository }}
      run: |
        if [ -z "$DISCORD_WEBHOOK" ]; then echo "No webhook configured, skipping"; exit 0; fi
        python3 - << 'PY'
        import json, os, sys, urllib.request, urllib.error
        webhook = os.environ["DISCORD_WEBHOOK"]
        status = os.environ.get("STATUS", "").lower()
        repo = os.environ["REPO"]
        run_url = os.environ["RUN_URL"]
        emoji, color = ("✅", 3066993) if status == "success" else ("⚪", 9807270) if status == "cancelled" else ("❌", 15158332)
        desc = "" if status == "success" else run_url
        payload = json.dumps({"embeds": [{"title": f"{emoji} {repo}", "description": desc, "color": color}]}).encode()
        try:
            req = urllib.request.Request(webhook, data=payload, headers={"Content-Type": "application/json"})
            urllib.request.urlopen(req, timeout=10)
            print("Discord notification sent")
        except Exception as e:
            print(f"Discord notification failed (non-fatal): {e}", file=sys.stderr)
        PY
